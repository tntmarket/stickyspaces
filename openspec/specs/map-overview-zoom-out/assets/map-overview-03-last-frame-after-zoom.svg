<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Map Overview Sequence Frame 3: Last Frame After Zoom</title>
  <desc id="desc">Final frame of zoom-out animation showing map overview cards and labels for ZO-FR-4 through ZO-FR-7 behavior.</desc>
  <defs>
    <style>
      .bg { fill: #040a16; }
      .menu { fill: #0d1628; }
      .canvas { fill: #081224; stroke: #1f2937; stroke-width: 2; }
      .title { font: 700 28px -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif; fill: #f3f4f6; }
      .subtitle { font: 500 17px -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif; fill: #d1d5db; }
      .menu-text { font: 600 14px -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif; fill: #d1d5db; }
      .ws { fill: #2f3749; stroke: #5b637a; stroke-width: 1.8; }
      .ws-active { fill: #4875c7; stroke: #c6ddff; stroke-width: 2.8; }
      .ws-title { font: 700 13px -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif; fill: #f3f4f6; }
      .thumb-bg { fill: #1e2d44; stroke: #344f76; stroke-width: 1; }
      .thumb-window-a { fill: #2b4367; }
      .thumb-window-b { fill: #38557f; }
      .thumb-window-c { fill: #263c5c; }
      .thumb-sticky { fill: #f5e8b4; stroke: #cabd8c; stroke-width: 1; }
      .empty-label { font: 600 13px -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif; fill: #cbd5e1; }
      .handle-dot { fill: #dbe3f2; opacity: 0.9; }
      .legend-panel { fill: #0f172a; stroke: #475569; stroke-width: 1.5; }
      .legend-title { font: 700 16px -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif; fill: #f8fafc; }
      .legend-body { font: 500 14px -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif; fill: #d1d5db; }
      .tag { fill: #1d4ed8; }
      .tag-text { font: 700 12px -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif; fill: #eff6ff; }
      .thumb-window-bar { fill: #1a2a42; }
    </style>
