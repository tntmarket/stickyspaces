  <rect class="bg" x="0" y="0" width="1600" height="980" />

  <text class="title" x="70" y="64">Frame 3 - Map Overview Last Frame (After Zoom)</text>
  <text class="subtitle" x="70" y="92">Overview canvas is fully revealed with user-arranged, non-grid workspace cards</text>

  <rect class="menu" x="70" y="120" width="1160" height="40" rx="9" />
