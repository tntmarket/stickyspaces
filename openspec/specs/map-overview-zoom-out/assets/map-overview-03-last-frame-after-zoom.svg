  <text class="menu-text" x="1080" y="145">Mon Mar 2 6:53 AM</text>

  <rect class="canvas" x="70" y="170" width="1160" height="730" rx="14" />
  <text class="empty-label" x="290" y="230">User-arranged map layout (drag cards to re-position)</text>

