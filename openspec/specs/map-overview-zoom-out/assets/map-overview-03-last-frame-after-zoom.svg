  <rect class="thumb-window-a" x="628" y="514" width="105" height="65" rx="5" />
  <rect class="thumb-window-bar" x="628" y="514" width="105" height="8" rx="5" />
  <rect class="thumb-window-b" x="742" y="521" width="105" height="56" rx="5" />
  <rect class="thumb-window-bar" x="742" y="521" width="105" height="8" rx="5" />
  <rect class="thumb-window-c" x="650" y="588" width="114" height="46" rx="5" />
  <rect class="thumb-window-bar" x="650" y="588" width="114" height="8" rx="5" />
  <rect class="thumb-sticky" x="788" y="586" width="53" height="33" rx="3" />
  <g>
    <circle class="handle-dot" cx="844" cy="486" r="2.2" />
    <circle class="handle-dot" cx="851" cy="486" r="2.2" />
    <circle class="handle-dot" cx="858" cy="486" r="2.2" />
  </g>

  <rect class="ws" x="940" y="250" width="280" height="190" rx="12" />
  <text class="ws-title" x="958" y="272">Workspace 3</text>
  <rect class="thumb-bg" x="958" y="282" width="244" height="140" rx="7" />
  <text class="empty-label" x="1034" y="358">No stickies</text>
  <g>
    <circle class="handle-dot" cx="1184" cy="266" r="2.2" />
    <circle class="handle-dot" cx="1191" cy="266" r="2.2" />
    <circle class="handle-dot" cx="1198" cy="266" r="2.2" />
  </g>

  <rect class="legend-panel" x="1260" y="250" width="300" height="330" rx="10" />
  <text class="legend-title" x="1276" y="280">Requirements</text>

  <rect class="tag" x="1276" y="326" width="72" height="24" rx="6" />
  <text class="tag-text" x="1290" y="342">ZO-FR-4</text>
  <text class="legend-body" x="1358" y="343">Empty workspace visible</text>

  <rect class="tag" x="1276" y="372" width="72" height="24" rx="6" />
  <text class="tag-text" x="1290" y="388">ZO-FR-5</text>
  <text class="legend-body" x="1358" y="389">Card positions configurable</text>

  <rect class="tag" x="1276" y="418" width="72" height="24" rx="6" />
  <text class="tag-text" x="1290" y="434">ZO-FR-6</text>
  <text class="legend-body" x="1358" y="435">Layout persists in session</text>

  <rect class="tag" x="1276" y="464" width="72" height="24" rx="6" />
  <text class="tag-text" x="1290" y="480">ZO-FR-7</text>
  <text class="legend-body" x="1358" y="481">Active workspace highlighted</text>
</svg>
